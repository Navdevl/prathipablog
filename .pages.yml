media:
  input: static
  output: /

content:
  - name: posts
    label: Posts
    type: collection
    path: content/post
    filename: '{primary}.md'
    view:
      fields: [title, author, date]
      primary: title
      sort: [date, title]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: author
        label: Author
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          time: true
      - name: description
        label: Description
        type: text
        required: true
      - name: image
        label: Image
        type: image
      - name: tags
        label: Tags
        type: string
        list: true
      - name: categories
        label: Categories
        type: string
        list: true
      - name: body
        label: Body
        type: rich-text
